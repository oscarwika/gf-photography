<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agua Dulces Lens</title>
    <meta
      name="description"
      content="Solo portraits, nature, and pet photography sessions."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Jost:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="page">
      <header class="site-header">
        <h1 class="site-title" id="site-title">Agua Dulces Lens</h1>
        <p class="site-subtitle" id="site-subtitle"></p>
        <nav class="site-nav" aria-label="Main">
          <a href="#about">About</a>
          <a href="#testimonials">Testimonials</a>
          <a href="#contact">Contact</a>
        </nav>
      </header>

      <main>
        <section id="work" class="section work-section">
          <div class="work-grid" id="work-grid"></div>
        </section>

        <section id="about" class="section about-section">
          <h2 class="section-label">About</h2>
          <p class="about-text" id="about-text"></p>
        </section>

        <section id="testimonials" class="section testimonials-section">
          <h2 class="section-label">Testimonials</h2>
          <div class="testimonials-grid" id="testimonials-grid"></div>
        </section>

        <section id="contact" class="section contact-section">
          <h2 class="section-label">Contact</h2>
          <div class="contact-details" id="contact-details"></div>
        </section>
      </main>

      <footer class="site-footer"></footer>
    </div>

    <div id="album-view" class="album-view" hidden>
      <div class="album-toolbar">
        <button type="button" class="back-button" id="back-button">
          Back
        </button>
        <p class="album-counter" id="album-counter"></p>
      </div>
      <div class="album-stage" id="album-stage">
        <button
          type="button"
          class="album-nav album-nav-prev"
          id="album-prev"
          aria-label="Previous photo"
        >
          <svg class="album-nav-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M15 6l-6 6 6 6"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </button>
        <figure class="album-figure">
          <img id="album-image" alt="" />
        </figure>
        <button
          type="button"
          class="album-nav album-nav-next"
          id="album-next"
          aria-label="Next photo"
        >
          <svg class="album-nav-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M9 6l6 6-6 6"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
