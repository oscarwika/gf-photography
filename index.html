<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photography</title>
    <meta
      name="description"
      content="Interior and lifestyle photography for Airbnb hosts. Portfolio, testimonials, and contact."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Jost:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="page">
      <header class="site-header">
        <h1 class="site-title" id="site-title">Photography</h1>
        <p class="site-subtitle" id="site-subtitle"></p>
        <nav class="site-nav" aria-label="Main">
          <a href="#work">Work</a>
          <a href="#about">About</a>
          <a href="#testimonials">Testimonials</a>
          <a href="#contact">Contact</a>
        </nav>
      </header>

      <main>
        <section id="work" class="section work-section">
          <h2 class="section-label">Work</h2>
          <div class="work-grid" id="work-grid"></div>
        </section>

        <section id="about" class="section about-section">
          <h2 class="section-label">About</h2>
          <p class="about-text" id="about-text"></p>
        </section>

        <section id="testimonials" class="section testimonials-section">
          <h2 class="section-label">Testimonials</h2>
          <div class="testimonials-grid" id="testimonials-grid"></div>
        </section>

        <section id="contact" class="section contact-section">
          <h2 class="section-label">Contact</h2>
          <div class="contact-details" id="contact-details"></div>
        </section>
      </main>

      <footer class="site-footer">
        <a
          id="instagram-link"
          class="instagram-link"
          href="#"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Instagram"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"
            />
          </svg>
        </a>
      </footer>
    </div>

    <div id="album-view" class="album-view" hidden>
      <div class="album-toolbar">
        <button type="button" class="back-button" id="back-button">
          Back to Work
        </button>
        <p class="album-title" id="album-title"></p>
        <p class="album-counter" id="album-counter"></p>
      </div>
      <div class="album-stage">
        <button
          type="button"
          class="album-nav album-nav-prev"
          id="album-prev"
          aria-label="Previous photo"
        >
          ‹
        </button>
        <figure class="album-figure">
          <img id="album-image" alt="" />
        </figure>
        <button
          type="button"
          class="album-nav album-nav-next"
          id="album-next"
          aria-label="Next photo"
        >
          ›
        </button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
